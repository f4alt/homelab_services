services:
  api:
    build: .
    image: inventory-manager
    container_name: inventory-manager-api
    environment:
      DB_PATH: /data/inventory.db
      API_PORT: 5000
    ports:
      - ${API_HOST_PORT:-5000}:5000
    volumes:
      - ${SOURCE_DATA_PATH:-./data}:/data
    command: ["python", "api.py"]

  gui:
    image: inventory-manager
    container_name: inventory-manager-gui
    profiles:
      - gui
    depends_on:
      - api
    environment:
      API_URL: http://api:5000
      WEB_PORT: 5001
    ports:
      - ${WEB_HOST_PORT:-5001}:5001
    command: ["python", "web.py"]
