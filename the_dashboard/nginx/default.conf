server {
  listen 80;
  server_name _;

  # ensure per-request logs are off at server level
  access_log off;

  # Serve static dashboard
  root /usr/share/nginx/html;
  index platform/index.html;

  # Security & caching basics
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer-when-downgrade always;
  add_header Cache-Control "public, max-age=30" always;

  client_max_body_size 25m;

  location / {
    try_files $uri $uri/ /platform/index.html;
  }

  location = /config {
    try_files /platform/config-editor.html =404;
  }

  # runtime configuration should be visible immediately
  location = /config.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # ES modules must be served as JavaScript for browser module loading.
  location ~ \.mjs$ {
    default_type application/javascript;
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://gateway:3000/api/;
    proxy_http_version 1.1;

    proxy_request_buffering off;
    proxy_buffering off;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # (optional) don't cache API in browsers/proxies
    add_header Cache-Control "no-store" always;
  }
}
