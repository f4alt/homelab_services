# Minimal, quiet nginx config
# - only log >=error (suppresses "notice" startup lines)
# - disable access logs
# - single worker to avoid a flood of "start worker process" messages

user  nginx;
worker_processes  1;

error_log  /dev/stderr error;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # No access logs (quiet)
    access_log off;

    sendfile        on;
    keepalive_timeout  65;

    # Load our site config
    include /etc/nginx/conf.d/*.conf;
}

